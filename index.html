<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAITH – return your crypto dust</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@solana/web3.js@1.95.3/lib/index.iife.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { background: radial-gradient(circle at 10% 20%, #0D0617, #05020A); font-family: 'Inter', sans-serif; }
        .gradient-text { background: linear-gradient(135deg, #9945FF, #FF6B9D); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; }
        .btn-primary { background: linear-gradient(90deg, #9945FF, #FF6B9D); transition: all 0.2s; }
        .btn-primary:hover { transform: scale(1.02); box-shadow: 0 8px 20px rgba(153,69,255,0.3); }
    </style>
</head>
<body class="text-white">
    <div class="max-w-4xl mx-auto px-4 py-8">
        <div class="text-center mb-8">
            <div class="inline-flex items-center gap-2 bg-white/5 rounded-full px-4 py-1.5 border border-white/10 mb-4">
                <i class="fas fa-shield-alt text-purple-400"></i> <span class="text-xs">⚡ BUILT ON SOLANA</span>
            </div>
            <h1 class="text-6xl font-extrabold"><span class="gradient-text">FAITH</span></h1>
            <p class="text-gray-300 mt-2">return your crypto dust · 3 steps · 5% transparent fee</p>
            <!-- Live SOL price -->
            <div class="mt-3 text-sm text-gray-400 flex justify-center items-center gap-2">
                <i class="fas fa-chart-line text-emerald-400"></i>
                <span id="solPrice">Loading SOL price...</span>
            </div>
        </div>

        <div class="card p-6 mb-6">
            <div class="flex justify-between items-center flex-wrap gap-4">
                <div class="flex items-center gap-3">
                    <i class="fas fa-wallet text-2xl text-purple-400"></i>
                    <div><div class="font-semibold">Wallet</div><div id="walletStatus" class="text-sm text-gray-400">Not connected</div></div>
                </div>
                <button id="connectBtn" class="bg-purple-600 px-5 py-2 rounded-xl font-bold shadow-md"><i class="fab fa-phantom"></i> Connect Phantom</button>
            </div>
        </div>

        <div class="card p-6 mb-6">
            <h2 class="text-xl font-bold mb-3"><i class="fas fa-chart-line text-purple-400"></i> Dust Results</h2>
            <div id="results" class="text-center text-gray-400 py-6">Connect wallet to scan</div>
            <div id="claimArea" class="hidden mt-4 text-center"></div>
        </div>

        <!-- Footer with your quip -->
        <div class="text-center text-gray-500 text-xs border-t border-white/10 pt-6">
            ⚡ built for Faith ❤️ Paps Still Wants his Villa 😜<br>
            FAITH — No private keys, no wallet drains. Powered by Solana.
        </div>
    </div>

    <script>
        (async function() {
            // ----- Live SOL price (Jupiter API) -----
            async function updateSolPrice() {
                try {
                    const resp = await fetch('https://quote-api.jup.ag/v6/price?ids=So11111111111111111111111111111111111111112');
                    const data = await resp.json();
                    const price = data.data.So11111111111111111111111111111111111111112.price;
                    document.getElementById('solPrice').innerHTML = `SOL: $${parseFloat(price).toFixed(2)} USD`;
                } catch(e) {
                    document.getElementById('solPrice').innerHTML = 'SOL: $--.--';
                }
            }
            updateSolPrice();
            setInterval(updateSolPrice, 60000); // every minute

            // ----- Wallet connection and dust claim -----
            const RPC = "https://api.mainnet-beta.solana.com";
            const TOKEN_PROGRAM = new solanaWeb3.PublicKey("TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA");
            const RENT = 0.00203928;
            let connection = new solanaWeb3.Connection(RPC, "confirmed");
            let wallet = null;
            let walletPubkey = null;
            let dustAccounts = [];

            const connectBtn = document.getElementById("connectBtn");
            const walletStatus = document.getElementById("walletStatus");
            const resultsDiv = document.getElementById("results");
            const claimArea = document.getElementById("claimArea");

            connectBtn.onclick = async () => {
                if (!window.solana || !window.solana.isPhantom) {
                    alert("Please install Phantom wallet from phantom.app");
                    return;
                }
                try {
                    const resp = await window.solana.connect();
                    wallet = window.solana;
                    walletPubkey = resp.publicKey;
                    walletStatus.innerText = `${walletPubkey.toBase58().slice(0,6)}...${walletPubkey.toBase58().slice(-4)} ✅`;
                    connectBtn.disabled = true;
                    await scanWallet();
                } catch(e) { alert("Connection rejected"); }
            };

            async function scanWallet() {
                resultsDiv.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Scanning token accounts...';
                claimArea.classList.add("hidden");
                try {
                    const accounts = await connection.getTokenAccountsByOwner(walletPubkey, { programId: TOKEN_PROGRAM });
                    const tokenAccounts = accounts.value;
                    let emptyPubkeys = [];
                    for (let acc of tokenAccounts) {
                        const info = await connection.getTokenAccountBalance(acc.pubkey);
                        if (info.value.uiAmount === 0) emptyPubkeys.push(acc.pubkey);
                    }
                    dustAccounts = emptyPubkeys;
                    const totalSol = dustAccounts.length * RENT;
                    const fee = totalSol * 0.05;
                    const userGets = totalSol - fee;
                    resultsDiv.innerHTML = `
                        <div class="bg-black/40 rounded-xl p-4 border border-purple-500/30">
                            <div class="grid grid-cols-3 gap-4 text-center">
                                <div><div class="text-2xl font-bold">${dustAccounts.length}</div><div class="text-xs">dust accounts</div></div>
                                <div><div class="text-2xl font-bold text-purple-300">${totalSol.toFixed(5)} ◎</div><div class="text-xs">recoverable</div></div>
                                <div><div class="text-2xl font-bold text-green-300">${userGets.toFixed(5)} ◎</div><div class="text-xs">you receive (5% fee)</div></div>
                            </div>
                        </div>
                    `;
                    if (dustAccounts.length > 0) {
                        claimArea.classList.remove("hidden");
                        claimArea.innerHTML = `<button id="claimBtn" class="btn-primary px-6 py-2 rounded-full font-bold text-white shadow-lg"><i class="fas fa-gem mr-2"></i> CLAIM ${userGets.toFixed(5)} SOL</button>`;
                        document.getElementById("claimBtn").onclick = claimDust;
                    } else {
                        claimArea.classList.add("hidden");
                    }
                } catch(e) {
                    resultsDiv.innerHTML = `<div class="text-red-400">Error scanning: ${e.message}</div>`;
                }
            }

            async function claimDust() {
                if (!wallet || dustAccounts.length === 0) return;
                try {
                    const instructions = [];
                    for (let pubkey of dustAccounts) {
                        const ix = solanaWeb3.Token.createCloseAccountInstruction(
                            pubkey,
                            walletPubkey,
                            walletPubkey
                        );
                        instructions.push(ix);
                    }
                    const blockhash = (await connection.getRecentBlockhash()).blockhash;
                    const tx = new solanaWeb3.Transaction({ feePayer: walletPubkey, recentBlockhash: blockhash });
                    tx.add(...instructions);
                    const signed = await wallet.signTransaction(tx);
                    const sig = await connection.sendRawTransaction(signed.serialize());
                    await connection.confirmTransaction(sig, "confirmed");
                    alert(`✅ Claim success! TX: ${sig}\nRecovered ~${(dustAccounts.length * RENT * 0.95).toFixed(5)} SOL`);
                    await scanWallet(); // refresh
                } catch(e) {
                    alert("Claim failed: " + e.message);
                }
            }
        })();
    </script>
</body>
</html>
